<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="images/clapperboard.png">
    <title>Select Seats - CineVerse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-900 text-white">
    <!-- Navigation Bar -->
<div class="fixed top-6 left-6 z-50">
    <button onclick="window.location.href='details.html'" 
            class="group flex items-center space-x-2 text-white bg-black bg-opacity-40 hover:bg-opacity-80 backdrop-blur-md px-5 py-3 rounded-full border border-white/10 transition-all duration-300 ease-out hover:border-red-500 hover:scale-105 active:scale-95 shadow-lg">
        
        <span class="transform transition-transform duration-300 group-hover:-translate-x-1 text-xl">←</span>
        
        <span class="font-bold uppercase tracking-widest text-sm">Back</span>
    </button>
</div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const session = JSON.parse(localStorage.getItem('userSession') || '{}');
            const nameDisplay = document.getElementById('navUserName');
            if (session && session.email) {
                const parts = [];
                if (session.name) parts.push(session.name);
                if (session.lastname) parts.push(session.lastname);
                const extractedName = parts.length > 0 ? parts.join(" ") : session.email.split('@')[0];
                if(nameDisplay) nameDisplay.textContent = extractedName;
            }
        });
        function logout() {
            localStorage.removeItem('userSession');
            window.location.href = 'signin.html';
        }
    </script>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <h1 class="text-4xl font-bold mb-2" id="pageTitle">Select Your Seats</h1>
        <p class="text-gray-400 mb-8" id="pageSubtitle">Choose your seats in the immersive CineVerse auditorium.</p>

        <div class="relative mx-auto max-w-[1400px]">

            <div class="mt-12 grid gap-4">
                <div class="seat-row">
                    <span class="row-label">A</span>
                    <div class="row-seats" id="rowA"></div>
                </div>
                <div class="seat-row">
                    <span class="row-label">B</span>
                    <div class="row-seats" id="rowB"></div>
                </div>
                <div class="seat-row">
                    <span class="row-label">C</span>
                    <div class="row-seats" id="rowC"></div>
                </div>
                <div class="seat-row">
                    <span class="row-label">D</span>
                    <div class="row-seats" id="rowD"></div>
                </div>
                <div class="seat-row">
                    <span class="row-label">E</span>
                    <div class="row-seats" id="rowE"></div>
                </div>
                <div class="seat-row">
                    <span class="row-label">F</span>
                    <div class="row-seats" id="rowF"></div>
                </div>
                <div class="seat-row">
                    <span class="row-label">G</span>
                    <div class="row-seats" id="rowG"></div>
                </div>
                <div class="seat-row">
                    <span class="row-label">H</span>
                    <div class="row-seats" id="rowH"></div>
                </div>
            </div>

            <div class="cinema-screen" aria-hidden="true"></div>

            <div class="mt-10 flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
                <div class="flex flex-wrap items-center gap-4 text-sm text-gray-400">
                    <div class="flex items-center gap-3">
                        <span class="inline-flex h-4 w-4 rounded-full bg-slate-600 ring-2 ring-white/10"></span>
                        Available
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="inline-flex h-4 w-4 rounded-full bg-rose-500 ring-2 ring-white/10"></span>
                        Selected
                    </div>
                </div>
                <button id="bookNowBtn" onclick="handleConfirmBooking()" class="rounded-full bg-yellow-400 hover:bg-yellow-500 text-slate-900 px-8 py-3 text-lg font-semibold transition">
                    BOOK NOW
                </button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <div id="booking-bar" class="booking-bar">
        <div class="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between text-slate-950">
            <div class="space-y-1 text-sm font-semibold">
                <div>Selected seats: <span id="bookingSeats">0</span></div>
                <div>Movie: <span id="bookingMovie">-</span></div>
                <div>Date / Time: <span id="bookingDateTime">-</span></div>
            </div>
            <div class="text-sm font-bold">Total: <span id="bookingTotal">0</span> JOD</div>
            <button onclick="transitionTo('payment.html')" class="rounded-full bg-black text-white px-8 py-3 font-bold hover:bg-gray-900 transition">
                PAY NOW
            </button>
        </div>
    </div>

    <!-- Success Modal -->
    <div id="successModal" class="hidden fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center z-50">
        <div class="bg-gray-800 rounded-lg p-8 text-center max-w-md">
            <div class="text-6xl mb-4">✅</div>
            <h2 class="text-2xl font-bold mb-4">Booking Confirmed!</h2>
            <p class="text-gray-300 mb-6" id="confirmationText">Your tickets have been booked successfully.</p>
            <button onclick="goHome()" class="bg-red-600 hover:bg-red-700 px-8 py-2 rounded-lg font-bold">
                Back to Home
            </button>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
