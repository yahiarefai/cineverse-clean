<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="images/clapperboard.png">
    <title>Profile - CineVerse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-black text-white p-8 opacity-0 transition-opacity duration-500">

    <div class="fixed top-6 left-6 z-50">
        <button onclick="goBack()" class="group flex items-center space-x-2 text-white bg-black bg-opacity-40 hover:bg-opacity-80 backdrop-blur-md px-5 py-3 rounded-full border border-white/10 transition-all duration-300 hover:border-red-600 hover:shadow-[0_0_15px_rgba(220,38,38,0.5)]">
            <span class="transform transition-transform duration-300 group-hover:-translate-x-1 text-xl group-hover:text-red-500">←</span>
            <span class="font-bold uppercase tracking-widest text-sm group-hover:text-red-500">Back</span>
        </button>
    </div>

    <div class="max-w-4xl mx-auto pt-20">
        <h1 class="text-3xl font-bold mb-8">Profile</h1>

        <div class="bg-[#111] border border-[#222] p-8 rounded-lg mb-8">
            <h2 class="text-xl font-semibold mb-2">Profile Information</h2>
            <p class="text-gray-400 mb-6 text-sm">Update your account's profile information and email address.</p>
            
            <label class="block mb-1 text-gray-300">Name</label>
            <input type="text" id="profileName" class="w-full bg-black border border-gray-800 p-3 rounded text-white mb-4 focus:border-red-600 focus:outline-none transition">
            
            <label class="block mb-1 text-gray-300">Lastname</label>
            <input type="text" id="profileLastname" class="w-full bg-black border border-gray-800 p-3 rounded text-white mb-4 focus:border-red-600 focus:outline-none transition">
            
            <label class="block mb-1 text-gray-300">Email</label>
            <input type="email" id="profileEmail" class="w-full bg-black border border-gray-800 p-3 rounded text-white focus:border-red-600 focus:outline-none transition">
            
            <button onclick="saveProfile()" class="bg-white text-black font-bold px-8 py-2 mt-6 rounded hover:bg-gray-200 transition">
    SAVE
</button>
        </div>

        <div class="bg-[#111] border border-[#222] p-8 rounded-lg">
            <h2 class="text-xl font-semibold mb-2">Update Password</h2>
            <p class="text-gray-400 mb-6 text-sm">Ensure your account is using a long, random password to stay secure.</p>
            
            <label class="block mb-1 text-gray-300">Current Password</label>
            <input type="password" id="currentPassword" class="w-full bg-black border border-gray-800 p-3 rounded text-white mb-4 focus:border-red-600 focus:outline-none transition">
            
            <label class="block mb-1 text-gray-300">New Password</label>
            <input type="password" id="newPassword" class="w-full bg-black border border-gray-800 p-3 rounded text-white mb-4 focus:border-red-600 focus:outline-none transition">
            
            <label class="block mb-1 text-gray-300">Confirm Password</label>
            <input type="password" id="confirmNewPassword" class="w-full bg-black border border-gray-800 p-3 rounded text-white focus:border-red-600 focus:outline-none transition">
            
            <button onclick="changePassword()" class="bg-white text-black font-bold px-8 py-2 mt-6 rounded hover:bg-gray-200 transition">
    SAVE
</button>
        </div>
    </div>

    <script>
        // 1. حركة الظهور عند فتح الصفحة
        window.addEventListener('load', () => {
            document.body.classList.remove('opacity-0');
            document.body.classList.add('opacity-100');
        });

        const session = JSON.parse(localStorage.getItem("userSession")) || {};

document.getElementById("profileName").value =
    session.user_metadata?.name || "";

document.getElementById("profileLastname").value =
    session.user_metadata?.lastname || "";

document.getElementById("profileEmail").value =
    session.email || "";

        // 2. حركة الاختفاء عند كبس زر الرجوع
        function goBack() {
            document.body.classList.remove('opacity-100');
            document.body.classList.add('opacity-0');
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 400);
        }

      function saveProfile() {

    const name = document.getElementById("profileName").value;
    const lastname = document.getElementById("profileLastname").value;
    const email = document.getElementById("profileEmail").value;

    let session = JSON.parse(localStorage.getItem("userSession")) || {};

    const oldEmail = session.email;

if (!session.user_metadata) {
    session.user_metadata = {};
}

session.user_metadata.name = name;
session.user_metadata.lastname = lastname;
session.email = email;

    let usersDB = JSON.parse(localStorage.getItem("usersDB")) || [];

    const userIndex = usersDB.findIndex(user => user.email === oldEmail);

    if (userIndex !== -1) {
        usersDB[userIndex].name = name;
        usersDB[userIndex].lastname = lastname;
        usersDB[userIndex].email = email;

        localStorage.setItem("usersDB", JSON.stringify(usersDB));
    }

    localStorage.setItem("userSession", JSON.stringify(session));

    alert("✅ Profile updated successfully");
}

function changePassword() {

    const currentPassword = document.getElementById("currentPassword").value;
    const newPassword = document.getElementById("newPassword").value;
    const confirmPassword = document.getElementById("confirmNewPassword").value;
    
    const usersDB = JSON.parse(localStorage.getItem("usersDB")) || [];
const session = JSON.parse(localStorage.getItem("userSession")) || {};

const currentUser = usersDB.find(user => user.email === session.email);

if (!currentUser || currentUser.password !== currentPassword) {
    alert("❌ Current password is incorrect");
    return;
}

    if (newPassword !== confirmPassword) {
        alert("❌ New passwords do not match");
        return;
    }

    if (newPassword.length < 6) {
        alert("❌ Password must be at least 6 characters");
        return;
    }



const userIndex = usersDB.findIndex(user => user.email === session.email);

if (userIndex !== -1) {
    usersDB[userIndex].password = newPassword;
    localStorage.setItem("usersDB", JSON.stringify(usersDB));
}

    alert("✅ Password updated successfully");
}
    </script>
</body>
</html>
