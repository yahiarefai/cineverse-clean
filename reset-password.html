<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="images/clapperboard.png">
    <title>Reset Password - CineVerse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gradient-to-br from-gray-950 via-gray-900 to-black text-white overflow-hidden">
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-40 -right-40 w-80 h-80 bg-red-600 rounded-full mix-blend-multiply filter blur-3xl opacity-10 animate-pulse"></div>
        <div class="absolute -bottom-40 -left-40 w-80 h-80 bg-purple-600 rounded-full mix-blend-multiply filter blur-3xl opacity-10 animate-pulse" style="animation-delay: 2s;"></div>
    </div>

    <div class="min-h-screen flex items-center justify-center px-4 relative z-10">
        <div class="w-full max-w-md animate-fadeIn">
            <div class="text-center mb-12">
                <div class="flex items-center justify-center space-x-3 mb-4">
                    <span class="text-5xl">🎬</span>
                    <h1 class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-pink-500">CineVerse</h1>
                </div>
                <p class="text-gray-400 text-sm">Reset Your Password</p>
            </div>

            <div class="bg-gray-800 bg-opacity-50 backdrop-blur-xl rounded-2xl shadow-2xl p-8 border border-gray-700">
                <h2 class="text-3xl font-bold mb-2 text-center">Set New Password</h2>
                <p class="text-gray-400 text-center mb-8">Enter a new password for your CineVerse account</p>

                <form id="resetForm" class="space-y-6">
                    <div>
                        <label for="newPassword" class="block text-sm font-medium mb-2">New Password</label>
                        <input 
                            type="password" 
                            id="newPassword" 
                            name="newPassword"
                            required
                            placeholder="••••••••" 
                            class="w-full px-4 py-3 bg-gray-700 bg-opacity-50 border border-gray-600 rounded-lg focus:outline-none focus:border-red-500 focus:ring-2 focus:ring-red-500 focus:ring-opacity-50 transition"
                        >
                    </div>

                    <div>
                        <label for="confirmPassword" class="block text-sm font-medium mb-2">Confirm New Password</label>
                        <input 
                            type="password" 
                            id="confirmPassword" 
                            name="confirmPassword"
                            required
                            placeholder="••••••••" 
                            class="w-full px-4 py-3 bg-gray-700 bg-opacity-50 border border-gray-600 rounded-lg focus:outline-none focus:border-red-500 focus:ring-2 focus:ring-red-500 focus:ring-opacity-50 transition"
                        >
                    </div>

                    <button 
                        type="submit"
                        id="resetBtn"
                        class="w-full bg-gradient-to-r from-red-600 to-red-700 hover:from-red-700 hover:to-red-800 py-3 rounded-lg font-bold text-lg transition transform hover:scale-105 mt-8"
                    >
                        Reset Password
                    </button>
                </form>

                <p class="text-center text-gray-400 mt-6">
                    <a href="signin.html" class="text-red-500 hover:text-red-400 font-semibold transition">← Back to Sign In</a>
                </p>
            </div>

            <p class="text-center text-gray-500 text-xs mt-8">
                Password must be at least 8 characters long
            </p>
        </div>
    </div>

    <script>
        // 2. إعدادات Supabase (تأكد من استبدال المفتاح الطويل)
        const supabaseUrl = 'https://ectftbenssqjnjbjiati.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVjdGZ0YmVuc3Nxam5qYmppYXRpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNzE0ODIsImV4cCI6MjA5NDk0NzQ4Mn0.2kWHuS41qV5Hi4Mfid9kn5bD_4u-MyqTvA5Q1I0DExA';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

document.getElementById('resetForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const newPassword = document.getElementById('newPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const btn = document.getElementById('resetBtn');

    if (newPassword !== confirmPassword) {
        alert('❌ Passwords do not match!');
        return;
    }

    if (newPassword.length < 8) {
        alert('❌ Password must be at least 8 characters');
        return;
    }

    btn.disabled = true;
    btn.innerText = 'Updating...';

    try {
        // 🔥 تحديث الباسورد مباشرة
        const { error } = await supabase.auth.updateUser({
            password: newPassword
        });

        if (error) {
            throw error;
        }

        alert('✅ Password updated successfully');

        // 🔥 logout عشان ينقطع القديم
        await supabase.auth.signOut();

        // 🔥 redirect للصفحة الرئيسية
        window.location.replace('index.html');

    } catch (err) {
        alert('❌ ' + err.message);
        btn.disabled = false;
        btn.innerText = 'Reset Password';
    }
});
    </script>
</body>
</html>
